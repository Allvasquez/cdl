<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CDL Master NJ 2026</title><script src="https://cdn.tailwindcss.com"></script>
<style>.view{display:none}.view.active{display:block}.lesson.active{background:#eff6ff;border-color:#2563eb}.correct{background:#f0fdf4!important;border-color:#16a34a!important}.wrong{background:#fef2f2!important;border-color:#dc2626!important}</style></head>
<body class="bg-slate-50 text-slate-900">
<header class="sticky top-0 z-40 border-b bg-white/95 backdrop-blur"><div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
<div class="flex items-center gap-3"><div class="grid h-11 w-11 place-items-center rounded-2xl bg-blue-700 text-2xl">🚛</div><div><b>CDL MASTER NJ 2026</b><p id="sub" class="text-xs text-slate-500"></p></div></div>
<nav class="hidden gap-2 md:flex"><button data-v="course" class="nav px-4 py-2 font-bold" id="navCourse"></button><button data-v="quiz" class="nav px-4 py-2 font-bold" id="navExam"></button><button data-v="mistakes" class="nav px-4 py-2 font-bold" id="navMist"></button></nav>
<button id="lang" class="rounded-xl bg-slate-900 px-4 py-2 font-black text-white">ES</button></div></header>

<section class="bg-gradient-to-br from-blue-900 via-blue-700 to-cyan-600 text-white"><div class="mx-auto grid max-w-7xl gap-8 px-4 py-16 lg:grid-cols-[1.2fr_.8fr]">
<div><span id="badge" class="rounded-full bg-white/15 px-3 py-1 text-sm font-bold"></span><h1 id="hero" class="mt-5 text-4xl font-black sm:text-6xl"></h1><p id="herop" class="mt-5 max-w-2xl text-lg leading-8"></p>
<div class="mt-7 flex gap-3"><button data-v="course" id="start" class="nav rounded-2xl bg-white px-6 py-3 font-black text-blue-800"></button><button data-v="quiz" id="practice" class="nav rounded-2xl border border-white/40 px-6 py-3 font-black"></button></div></div>
<div class="rounded-3xl bg-white/10 p-6 ring-1 ring-white/20"><p id="prog" class="font-bold"></p><div class="mt-4 flex items-end justify-between"><span id="pct" class="text-5xl font-black">0%</span><span id="count"></span></div><div class="mt-4 h-4 rounded-full bg-white/20"><div id="bar" class="h-full rounded-full bg-white"></div></div>
<div class="mt-6 grid grid-cols-3 gap-3 text-center"><div class="rounded-2xl bg-white/10 p-3"><b class="block text-2xl">12</b><span id="ls"></span></div><div class="rounded-2xl bg-white/10 p-3"><b class="block text-2xl">90</b><span id="qs"></span></div><div class="rounded-2xl bg-white/10 p-3"><b class="block text-2xl">50</b><span id="njTest"></span></div></div></div></div></section>

<main class="mx-auto max-w-7xl px-4 py-10">
<section id="course" class="view active"><div class="mb-7 flex flex-col justify-between gap-4 md:flex-row"><div><p id="route" class="font-bold text-blue-700"></p><h2 id="ct" class="text-3xl font-black"></h2></div><input id="search" class="rounded-2xl border px-4 py-3"></div>
<div class="grid gap-7 lg:grid-cols-[350px_1fr]"><aside class="rounded-3xl border bg-white p-3 shadow-xl"><div id="list" class="max-h-[70vh] space-y-2 overflow-auto"></div></aside>
<article class="rounded-3xl border bg-white p-8 shadow-xl"><div class="flex justify-between"><span id="lb" class="rounded-full bg-blue-100 px-3 py-1 font-bold text-blue-800"></span><button id="done" class="rounded-xl bg-emerald-600 px-4 py-2 font-bold text-white"></button></div><h2 id="title" class="mt-7 text-3xl font-black"></h2><p id="body" class="mt-5 text-lg leading-8"></p>
<div class="mt-7 rounded-2xl bg-amber-50 p-5"><b id="tip"></b><p id="tiptext" class="mt-2"></p></div><div class="mt-8 flex justify-between"><button id="prev" class="rounded-xl border px-4 py-2">←</button><button id="next" class="rounded-xl bg-blue-700 px-4 py-2 text-white">→</button></div></article></div></section>

<section id="quiz" class="view mx-auto max-w-5xl"><div class="rounded-3xl border bg-white p-8 shadow-xl"><div><p id="sim" class="font-bold text-blue-700"></p><h2 id="exam" class="text-3xl font-black"></h2><p id="examHelp" class="mt-2 text-slate-600"></p></div>
<div class="mt-5 grid gap-3 sm:grid-cols-2 lg:grid-cols-4"><button class="mode rounded-xl bg-blue-700 px-4 py-3 font-bold text-white" data-mode="general" id="modeGeneral"></button><button class="mode rounded-xl border px-4 py-3 font-bold" data-mode="air" id="modeAir"></button><button class="mode rounded-xl border px-4 py-3 font-bold" data-mode="combination" id="modeCombination"></button><button class="mode rounded-xl border px-4 py-3 font-bold" data-mode="mixed" id="modeMixed"></button></div>
<div class="mt-6 flex justify-between"><span id="qcount" class="rounded-full bg-slate-100 px-4 py-2 font-bold"></span><span id="scoreLive" class="font-bold"></span></div><div class="mt-4 h-3 rounded-full bg-slate-100"><div id="qbar" class="h-full rounded-full bg-blue-700"></div></div><div id="qbox" class="mt-8"></div></div></section>

<section id="mistakes" class="view mx-auto max-w-4xl"><div class="flex items-center justify-between"><h2 id="mt" class="text-3xl font-black"></h2><button id="clear" class="rounded-xl border px-4 py-2 font-bold"></button></div><div id="ml" class="mt-6 space-y-4"></div></section>
</main>
<footer class="border-t bg-white"><div id="notice" class="mx-auto max-w-7xl px-4 py-8 text-sm leading-6 text-slate-500"></div></footer>
<script src="app.js"></script></body></html>
